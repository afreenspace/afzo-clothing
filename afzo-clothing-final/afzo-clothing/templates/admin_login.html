<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Admin — AFZO</title>
<link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}">
<style>body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--beige)}.card{background:#fff;border-radius:6px;padding:48px 44px;width:420px;box-shadow:0 24px 64px rgba(42,34,32,0.12)}.logo{font-family:var(--font-serif);font-size:28px;letter-spacing:6px;text-transform:uppercase;color:var(--dark);text-align:center;margin-bottom:4px}.logo span{color:var(--terra)}.sub{text-align:center;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--light);margin-bottom:36px}.err{font-size:12px;color:#b83232;background:#fdecea;padding:10px 14px;border-radius:3px;margin-bottom:16px;display:none}</style></head>
<body><div class="card">
<div class="logo">AFZ<span>O</span></div>
<div class="sub">Admin Portal</div>
<div class="err" id="errMsg"></div>
<form style="display:flex;flex-direction:column;gap:14px" id="adminForm">
  <div class="f-group"><label class="f-label">Email</label><input class="f-input" type="email" id="email" placeholder="admin@afzo.com" required></div>
  <div class="f-group"><label class="f-label">Password</label><input class="f-input" type="password" id="password" placeholder="••••••••" required></div>
  <button type="submit" class="f-submit" style="padding:14px;background:var(--terra);color:#fff;border:none;border-radius:3px;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:500;cursor:pointer">Enter Dashboard</button>
</form>
<p style="text-align:center;margin-top:20px;font-size:11px;color:var(--light)"><a href="/" style="color:var(--terra)">← Back to Website</a></p>
</div>
<script>
document.getElementById('adminForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const btn=e.target.querySelector('button');btn.textContent='Signing in...';btn.disabled=true;
  const res=await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('password').value})});
  const d=await res.json();
  if(res.ok){window.location.href='/admin/dashboard';}
  else{const err=document.getElementById('errMsg');err.textContent=d.error;err.style.display='block';btn.textContent='Enter Dashboard';btn.disabled=false;}
});
</script></body></html>
